---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tuf-port-number
  namespace: tuf-service
data:
  PORT: "8080"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tuf-server
  namespace: tuf-service
  labels:
    app.kubernetes.io/name: tuf-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tuf-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tuf-server
    spec:
      initContainers:
        - name: setup-tuf-data
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              cp /tuf-files/* /tuf-data/

              # Create the versioned metadata files that TUF expects
              cp /tuf-data/body-timestamp.json-*.json /tuf-data/timestamp.json
              cp /tuf-data/body-1.snapshot.json-*.json /tuf-data/1.snapshot.json
              cp /tuf-data/body-1.targets.json-*.json /tuf-data/1.targets.json

              # Create root.json from embedded content
              cp /tuf-root/root.json /tuf-data/root.json

              # Create targets directory and copy target files with hash-based names dynamically
              mkdir -p /tuf-data/targets

              # Process all target files using patterns instead of hardcoded names
              for file in /tuf-data/body-targets-*; do
                [ -f "$file" ] || continue

                # Extract the original filename by removing the body-targets- prefix and the -HASH.ext suffix
                basename_file=$(basename "$file")

                # Pattern: body-targets-<LONG-HASH>.<filename>-<SHORT-HASH>.<ext>
                # We want to extract <LONG-HASH>.<filename>.<ext>
                # Handle different patterns by removing the suffix intelligently
                without_prefix=$(echo "$basename_file" | sed 's/^body-targets-//')

                # Special case for tsa_intermedi -> tsa_intermediate_0.crt
                if echo "$without_prefix" | grep -q "tsa_intermedi-"; then
                  target_name=$(echo "$without_prefix" | sed 's/tsa_intermedi-.*/tsa_intermediate_0.crt.pem/')
                # For files ending with .-HASH.ext, remove the .-HASH part
                elif echo "$without_prefix" | grep -q '\.-[A-Za-z0-9]*\.'; then
                  target_name=$(echo "$without_prefix" | sed 's/\.-[A-Za-z0-9]*\./\./')
                # For files ending with -HASH.ext, remove the -HASH part but keep the extension
                elif echo "$without_prefix" | grep -q '\-[A-Za-z0-9]*\.[a-z]*$'; then
                  # Extract everything before -HASH, then add the extension
                  ext=$(echo "$without_prefix" | sed 's/.*\.//')
                  base=$(echo "$without_prefix" | sed 's/\(.*\)-[A-Za-z0-9]*\.[a-z]*$/\1/')
                  target_name="$base.$ext"
                else
                  # Fallback: remove -HASH.ext and add the extension
                  ext=$(echo "$basename_file" | sed 's/.*\.//')
                  base=$(echo "$without_prefix" | sed 's/-[A-Za-z0-9]*\.[a-z]*$//')
                  target_name="$base.$ext"
                fi

                if [ -n "$target_name" ]; then
                  cp "$file" "/tuf-data/targets/$target_name"
                  echo "Copied $basename_file -> targets/$target_name"
                else
                  echo "Warning: Could not parse filename pattern for $basename_file"
                fi
              done

              ls -la /tuf-data/
              ls -la /tuf-data/targets/
          volumeMounts:
            - name: tuf-files
              mountPath: /tuf-files
              readOnly: true
            - name: tuf-root
              mountPath: /tuf-root
              readOnly: true
            - name: tuf-data
              mountPath: /tuf-data
      containers:
        - name: tuf-server
          image: docker.io/nginx:1.25-alpine
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: NGINX_PORT
              value: "8080"
          volumeMounts:
            - name: tuf-data
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
      volumes:
        - name: tuf-files
          configMap:
            name: tuf-files
        - name: tuf-root
          configMap:
            name: tuf-root-data
        - name: tuf-data
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: tuf-nginx-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tuf-nginx-config
  namespace: tuf-service
data:
  nginx.conf: |
    server {
        listen 8080;
        server_name localhost;
        root /usr/share/nginx/html;

        location / {
            try_files $uri $uri/ =404;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type";
        }
    }
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: tuf-server
  name: tuf
  namespace: tuf-service
spec:
  ports:
  - name: http
    port: 8080
    protocol: TCP
    targetPort: 8080
  selector:
    app.kubernetes.io/name: tuf-server
  type: ClusterIP
