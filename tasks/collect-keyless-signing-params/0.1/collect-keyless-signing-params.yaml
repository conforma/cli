apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: collect-keyless-signing-params
  annotations:
    tekton.dev/displayName: Collect Keyless Signing Parameters
    tekton.dev/pipelines.minVersion: "0.12.1"
    tekton.dev/tags: ec, keyless, signing, configuration
  labels:
    app.kubernetes.io/version: "0.1"

spec:
  description: |
    Tekton task to collect Konflux configuration parameters related to
    keyless signing using cosign. The task attempts to read the "cluster-config"
    ConfigMap in the "konflux-info" namespace to extract signing parameters.

    In case the ConfigMap is not found, the task will output empty strings for all parameters,
    allowing the pipeline to continue without signing parameters.

  params:
    - name: configMapName
      type: string
      description: The name of the ConfigMap to read signing parameters from
      default: cluster-config

    - name: configMapNamespace
      type: string
      description: The namespace where the ConfigMap is located
      default: konflux-info

  results:
    - name: defaultOIDCIssuer
      type: string
      description: |
        A default OIDC issuer URL to be used for signing.

    - name: rekorExternalUrl
      type: string
      description: |
        The external URL of the Rekor transparency log.

    - name: fulcioExternalUrl
      type: string
      description: |
        The external URL of the Fulcio certificate authority.

    - name: tufExternalUrl
      type: string
      description: |
        The external URL of the TUF repository.

    - name: buildIdentityRegexp
      type: string
      description: |
        A regular expression to extract build identity from the OIDC token claims, if applicable.

    - name: keylessSigningEnabled
      type: string
      description: |
        A flag indicating whether keyless signing is enabled based on the presence of signing parameters.

  stepTemplate:
    securityContext:
      runAsUser: 1001

  steps:
    - name: collect-signing-params
      image: quay.io/conforma/cli:latest
      computeResources:
        limits:
          memory: 128Mi
          cpu: 50m
        requests:
          memory: 128Mi
          cpu: 50m
      script: |
        #!/usr/bin/env bash
        echo "Getting cluster-config ConfigMap"
        KFLX_CONFIG_PATH='/tmp/konflux_config.json'

        # Attempt to fetch the ConfigMap, capture exit code
        if kubectl get configmap "$(params.configMapName)" -n "$(params.configMapNamespace)" -o json > \
        "$KFLX_CONFIG_PATH" 2>/dev/null; then
            echo "ConfigMap found, extracting signing parameters"

            # Extract signing parameters from ConfigMap data, defaulting to empty string if not found
            defaultOIDCIssuer=$(jq -r '.data.defaultOIDCIssuer // ""' "$KFLX_CONFIG_PATH")
            rekorExternalUrl=$(jq -r '.data.rekorExternalUrl // ""' "$KFLX_CONFIG_PATH")
            fulcioExternalUrl=$(jq -r '.data.fulcioExternalUrl // ""' "$KFLX_CONFIG_PATH")
            tufExternalUrl=$(jq -r '.data.tufExternalUrl // ""' "$KFLX_CONFIG_PATH")
            buildIdentityRegexp=$(jq -r '.data.buildIdentityRegexp // ""' "$KFLX_CONFIG_PATH")
            keylessSigningEnabled=$(jq -r '.data.enableKeylessSigning // ""' "$KFLX_CONFIG_PATH")
        else
            echo "ConfigMap not found, using default empty values"

            # Set all parameters to empty strings when ConfigMap doesn't exist
            defaultOIDCIssuer=""
            rekorExternalUrl=""
            fulcioExternalUrl=""
            tufExternalUrl=""
            buildIdentityRegexp=""
            keylessSigningEnabled="false"
        fi

        # Write the values to the respective result paths and print them
        echo -n "$defaultOIDCIssuer" | tee "$(results.defaultOIDCIssuer.path)"
        echo -n "$rekorExternalUrl" | tee "$(results.rekorExternalUrl.path)"
        echo -n "$fulcioExternalUrl" | tee "$(results.fulcioExternalUrl.path)"
        echo -n "$tufExternalUrl" | tee "$(results.tufExternalUrl.path)"
        echo -n "$buildIdentityRegexp" | tee "$(results.buildIdentityRegexp.path)"
        echo -n "$keylessSigningEnabled" | tee "$(results.keylessSigningEnabled.path)"
